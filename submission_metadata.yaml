ai_tools_used:
  - "Claude (Eclectic IDE) — architecture discussion, code review, debugging"

ai_usage_summary: |
  Used Claude via the Eclectic IDE for architecture discussion, code review,
  and debugging. All ranking logic, skill taxonomy, signal weights, and design
  decisions were made by the team. No candidate data was fed to any LLM during
  the ranking process — the ranker is fully deterministic and CPU-only.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with 8 scoring components and explicit
  reasoning capture. Core signals: (1) JD skill taxonomy match across the
  skills list, career descriptions, and Redrob assessment scores — 60+
  keywords weighted by proficiency × duration; (2) title/role tier
  (ML/AI/NLP Engineer > SWE > non-tech); (3) YoE fit vs 5-9yr JD band;
  (4) behavioral signal composite (recruiter response rate, interview
  completion, GitHub activity, recency, saved-by-recruiters); (5) career
  depth — ML keyword breadth and production deployment signals in career
  descriptions; (6) company context — product/tech company ratio vs
  consulting, tech industry bonus, company size preference; (7) education
  tier; (8) availability (notice period, open-to-work, location).
  Honeypot detection filters reversed career dates and impossible skill
  claims. Runtime is ~50 seconds for 100K candidates on CPU with 16GB RAM.

